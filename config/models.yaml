# Local LLM provider model menu — the single source of truth for which models
# the Phase-3 assist may launch through a local provider CLI, and the editable
# price-per-1M-token assumptions the cost ledger uses when a matching pricing
# table exists.
#
# These prices are ESTIMATES / config defaults, not sacred constants. Review
# them against https://claude.com/pricing and update `last_reviewed` when you
# do. When the provider reports actual token usage the ledger uses it. When
# it does not, costs are computed from these numbers and labeled ESTIMATED.
# Providers/models without a matching price table show cost as unavailable.
# Codex uses a runtime provider-default fallback when explicitly selected; the
# persisted seed menu stays Claude-first so older local installs can still load
# this file.
#
# Fields per entry:
#   provider                 claude | codex (default: claude for old files)
#   alias                    short name used in config/CLI (--llm-model sonnet)
#   id                       full model id passed to the provider CLI when pinned
#   latest_alias             true => pass the ALIAS so it floats to the newest
#                            model of that tier as the provider CLI updates
#   pinned                   true => always pass the full id (never float)
#   requires_explicit_enable true => the AUTO router never selects this model
#                            unless the user opted in (llm.allow_fable / CLI);
#                            naming it in MANUAL mode counts as explicit opt-in
#   default_effort           effort used when nothing else specifies one
#   pricing_per_mtok         USD per 1M tokens (input / output / cache hit /
#                            5-minute cache write / 1-hour cache write)
#   extraction_profile       editable operational thresholds for choosing
#                            whole-deal vs per-document extraction

last_reviewed: "2026-06-25"

models:
  - alias: fable
    provider: claude
    id: claude-fable-5
    display_name: Claude Fable 5
    context_window: 1000000
    default_effort: high
    latest_alias: true
    pinned: false
    requires_explicit_enable: true   # highest-cost tier: explicit user opt-in only
    extraction_profile:
      default_shape: adaptive
      deal_pass_max_input_tokens: 500000
      deal_pass_max_documents: 8
      deal_pass_max_image_pages: 120
      deal_pass_max_fields: 300
      oversized_target_fields: 100
      max_parallel_document_calls: 3
    pricing_per_mtok:
      input: 10.00
      output: 50.00
      cache_hit: 1.00
      cache_write_5m: 12.50
      cache_write_1h: 20.00

